function isWeekendOrHoliday(dateStr) {
  const d = new Date(dateStr);
  const dow = d.getDay();
  return dow === 0 || dow === 6 || HOLIDAYS.has(dateStr);
}

function calcWorkingDays(start, end) {
  let count = 0;
  const cur = new Date(start);
  const endDate = new Date(end);
  while (cur <= endDate) {
    const ds = cur.toISOString().slice(0,10);
    if (!isWeekendOrHoliday(ds)) count++;
    cur.setDate(cur.getDate() + 1);
  }
  return count;
}

async function dbLoad(table) {
  const { data, error } = await sb.from(table).select("*");
  if (error) { console.error(error); return []; }
  return data.map(r => {
    if (table === "attendance") return { id: r.id, empId: r.emp_id, date: r.date, clockIn: r.clock_in, clockOut: r.clock_out };
    if (table === "leaves") return { id: r.id, empId: r.emp_id, empName: r.emp_name, startDate: r.start_date, endDate: r.end_date, reason: r.reason, leaveType: r.leave_type, halfType: r.half_type, status: r.status, appliedAt: r.applied_at, startHalf: r.start_half||false, endHalf: r.end_half||false };
    if (table === "company_events") return { id: r.id, title: r.title, type: r.type, startDate: r.start_date, endDate: r.end_date, color: r.color };
    if (table === "notices") return { id: r.id, title: r.title, content: r.content, author: r.author, createdAt: r.created_at };
    if (table === "todos") return { id: r.id, empId: r.emp_id, empName: r.emp_name, content: r.content, done: r.done, shared: r.shared, sharedTeam: r.shared_team||null, createdAt: r.created_at };
    return r;
  });
}

async function dbUpsert(table, item) {
  let row;
  if (table === "attendance") row = { id: item.id, emp_id: item.empId, date: item.date, clock_in: item.clockIn, clock_out: item.clockOut };
  else if (table === "leaves") row = { id: item.id, emp_id: item.empId, emp_name: item.empName, start_date: item.startDate, end_date: item.endDate, reason: item.reason, leave_type: item.leaveType, half_type: item.halfType, status: item.status, applied_at: item.appliedAt, start_half: item.startHalf||false, end_half: item.endHalf||false };
  else if (table === "company_events") row = { id: item.id, title: item.title, type: item.type, start_date: item.startDate, end_date: item.endDate, color: item.color };
  else if (table === "notices") row = { id: item.id, title: item.title, content: item.content, author: item.author, created_at: item.createdAt };
  else if (table === "todos") row = { id: item.id, emp_id: item.empId, emp_name: item.empName, content: item.content, done: item.done, shared: item.shared, shared_team: item.sharedTeam||null, created_at: item.createdAt };
  const { error } = await sb.from(table).upsert(row, { onConflict: "id" });
  if (error) console.error("upsert error:", table, error);
}

async function dbUpdate(table, id, fields) {
  const { error } = await sb.from(table).update(fields).eq("id", id);
  if (error) console.error("update error:", table, error);
}

async function dbDelete(table, id) {
  const { error } = await sb.from(table).delete().eq("id", id);
  if (error) console.error(error);
}

function calcUsedLeave(leaves, empId) {
  return leaves.filter(l => l.empId === empId && l.status === "approved")
    .reduce((sum, l) => {
      if (l.leaveType === "반차") return sum + 0.5;
      let d = calcWorkingDays(l.startDate, l.endDate);
      if (l.startHalf) d -= 0.5;
      if (l.endHalf) d -= 0.5;
      return sum + Math.max(d, 0);
    }, 0);
}

                    fontSize:15,boxSizing:"border-box",outline:"none",marginBottom:8}} />

            <div>
              <p style={{margin:"0 0 12px",fontSize:13,color:C.sub}}>관리자 비밀번호</p>

                onKeyDown={e=>e.key==="Enter"&&loginAdmin()} placeholder="비밀번호 입력"
                style={{width:"100%",padding:"12px 14px",borderRadius:10,border:"1px solid "+C.border,
                  fontSize:15,boxSizing:"border-box",outline:"none",marginBottom:8}} />

  );
}

function CalendarView({ leaves, companyEvents }) {
  const now = new Date();
  const [year, setYear] = useState(now.getFullYear());
  const [month, setMonth] = useState(now.getMonth());
  const [selectedDate, setSelectedDate] = useState(null);
  const approvedLeaves = leaves.filter(l => l.status === "approved");
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const tStr = (() => {
    const d = new Date();
    const kst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
    return kst.toISOString().slice(0, 10);
  })();
  const pad = (n) => String(n).padStart(2, "0");
  const ds = (d) => `${year}-${pad(month+1)}-${pad(d)}`;
  const DAYS = ["일","월","화","수","목","금","토"];
  const MN = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
  const mStart = `${year}-${pad(month+1)}-01`;
  const mEnd = `${year}-${pad(month+1)}-${pad(daysInMonth)}`;
  const mLeaves = approvedLeaves.filter(l => l.startDate <= mEnd && l.endDate >= mStart);
  const mEvents = (companyEvents||[]).filter(e => e.startDate <= mEnd && e.endDate >= mStart);

  // 선택된 날짜의 일정
  const selLeaves = selectedDate ? approvedLeaves.filter(l => l.startDate <= selectedDate && l.endDate >= selectedDate) : [];
  const selEvents = selectedDate ? (companyEvents||[]).filter(e => e.startDate <= selectedDate && e.endDate >= selectedDate) : [];

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <button onClick={() => { if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1); }}
          style={{...btn(C.card,C.text),border:`1px solid ${C.border}`,padding:"8px 14px"}}>←</button>
        <div style={{fontWeight:800,fontSize:17}}>{year}년 {MN[month]}</div>
        <button onClick={() => { if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1); }}
          style={{...btn(C.card,C.text),border:`1px solid ${C.border}`,padding:"8px 14px"}}>→</button>
      </div>
      <div style={{background:C.card,borderRadius:16,overflow:"hidden",boxShadow:"0 1px 8px #0001",marginBottom:16}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:C.primary}}>
          {DAYS.map((d,i) => <div key={d} style={{textAlign:"center",padding:"8px 0",fontSize:12,fontWeight:700,
            color:i===0?"#ffa8a8":i===6?"#a8c8ff":"#fff"}}>{d}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
          {Array(firstDay).fill(null).map((_,i) => <div key={"e"+i} style={{height:80,borderRight:`1px solid ${C.border}`,borderBottom:`1px solid ${C.border}`}} />)}
          {Array(daysInMonth).fill(null).map((_,i) => {
            const d = i+1; const s = ds(d);
            const lp = approvedLeaves.filter(l => l.startDate <= s && l.endDate >= s);
            const ev = (companyEvents||[]).filter(e => e.startDate <= s && e.endDate >= s);
            const isToday = s === tStr;
            const isSelected = s === selectedDate;
            const hasItems = lp.length > 0 || ev.length > 0;
            const col = (firstDay+i)%7;
            return (
              <div key={d} onClick={() => setSelectedDate(s === selectedDate ? null : s)}
                style={{height:80,overflow:"hidden",borderRight:`1px solid ${C.border}`,borderBottom:`1px solid ${C.border}`,
                  padding:"4px",cursor:hasItems?"pointer":"default",
                  background:isSelected?"#f0e8d8":isToday?C.primaryLight:C.card,
                  transition:"background 0.15s"}}>
                <div style={{fontSize:12,width:isToday?20:"auto",height:isToday?20:"auto",
                  background:isToday?C.primary:"none",color:isToday?"#fff":col===0?C.red:col===6?"#4dabf7":C.text,
                  borderRadius:isToday?"50%":0,display:"flex",alignItems:"center",justifyContent:"center",
                  fontWeight:isToday?800:400,marginBottom:2}}>{d}</div>
                {lp.slice(0,2).map((l,idx) => <div key={idx} style={{fontSize:9,background:"#e7edff",color:C.primary,
                  borderRadius:3,padding:"1px 3px",marginBottom:1,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{l.empName}</div>)}
                {ev.slice(0,1).map((e,idx) => <div key={idx} style={{fontSize:9,background:e.color+"33",color:e.color,
                  borderRadius:3,padding:"1px 3px",fontWeight:700,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{e.title}</div>)}
              </div>
            );
          })}
        </div>
      </div>

      {/* 선택된 날짜 팝업 */}
      {selectedDate && (selLeaves.length > 0 || selEvents.length > 0) && (
        <div style={{background:C.card,borderRadius:16,padding:20,marginBottom:16,boxShadow:"0 2px 16px #0002",border:`2px solid ${C.primary}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontWeight:800,fontSize:15}}>📅 {fmt(selectedDate)} 일정</div>
            <button onClick={()=>setSelectedDate(null)} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:C.sub}}>✕</button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {selEvents.map(e => (
              <div key={e.id} style={{borderLeft:`4px solid ${e.color}`,paddingLeft:12,paddingTop:4,paddingBottom:4}}>
                <div style={{fontWeight:700,color:e.color,fontSize:14}}>{e.title}</div>
                <div style={{fontSize:12,color:C.sub}}>{e.type} · {fmt(e.startDate)}{e.startDate!==e.endDate?" ~ "+fmt(e.endDate):""}</div>
              </div>
            ))}
            {selLeaves.map(l => (
              <div key={l.id} style={{borderLeft:`4px solid ${C.primary}`,paddingLeft:12,paddingTop:4,paddingBottom:4}}>
                <div style={{fontWeight:700,fontSize:14}}>{l.empName} {l.leaveType==="반차"?(l.halfType||"오전")+"반차":"휴가"}</div>
                <div style={{fontSize:12,color:C.sub}}>{l.leaveType==="반차"?fmt(l.startDate):fmt(l.startDate)+" ~ "+fmt(l.endDate)}</div>
              </div>
            ))}
          </div>
        </div>
      )}
      {selectedDate && selLeaves.length===0 && selEvents.length===0 && (
        <div style={{background:C.card,borderRadius:16,padding:16,marginBottom:16,textAlign:"center",color:C.sub,fontSize:13}}>
          {fmt(selectedDate)} 일정이 없어요
        </div>
      )}

      {/* 이번달 일정 목록 */}
      {(mLeaves.length > 0 || mEvents.length > 0) && (
        <div>
          <div style={{fontSize:14,fontWeight:700,marginBottom:10}}>이번달 일정</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {mEvents.map(e => <div key={e.id} style={{background:C.card,borderRadius:12,padding:"12px 16px",borderLeft:`4px solid ${e.color}`,boxShadow:"0 1px 6px #0001"}}>
              <div style={{fontWeight:700,fontSize:14,color:e.color}}>{e.title}</div>
              <div style={{fontSize:12,color:C.sub}}>{fmt(e.startDate)}{e.startDate!==e.endDate?` ~ ${fmt(e.endDate)}`:""} · {e.type}</div>
            </div>)}
            {mLeaves.map(l => <div key={l.id} style={{background:C.card,borderRadius:12,padding:"12px 16px",borderLeft:`4px solid ${C.primary}`,boxShadow:"0 1px 6px #0001"}}>
              <div style={{fontWeight:700,fontSize:14}}>{l.empName} {l.leaveType==="반차"?`${l.halfType||"오전"}반차`:"휴가"}</div>
              <div style={{fontSize:12,color:C.sub}}>{l.leaveType==="반차"?fmt(l.startDate):`${fmt(l.startDate)} ~ ${fmt(l.endDate)}`} ({l.leaveType==="반차"?"0.5일":diffDays(l.startDate,l.endDate)+"일"})</div>
            </div>)}
          </div>
        </div>
      )}
    </div>
  );
}

function EmployeeScreen({ user, employees, attendance, setAttendance, leaves, setLeaves, companyEvents, notices, todos, setTodos, onLogout }) {
  const [tab, setTab] = useState("home");
  const [leaveForm, setLeaveForm] = useState({ startDate:todayStr(), endDate:todayStr(), reason:"", leaveType:"연차", halfType:"오전", startHalf:false, startHalfType:"오전", endHalf:false, endHalfType:"오후" });
  const [toast, setToast] = useState("");
  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(""),2500); };
  const todayRec = attendance.find(a => a.empId===user.id && a.date===todayStr());
  const usedLeave = calcUsedLeave(leaves, user.id);
  const remainLeave = user.unlimited ? Infinity : (user.totalLeave||0) - usedLeave;
  const myLeaves = leaves.filter(l => l.empId===user.id).sort((a,b)=>b.id-a.id);
  const approvedLeaves = leaves.filter(l => l.status==="approved");
  const thisMonth = (() => {
    const d = new Date();
    const kst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
    return kst.toISOString().slice(0,7);
  })();
  const monthRecs = attendance.filter(a => a.empId===user.id && a.date.startsWith(thisMonth));

  const calcHours = (ci, co) => {
    if (!ci||!co) return "-";
    const [h1,m1]=ci.split(":").map(Number); const [h2,m2]=co.split(":").map(Number);
    const mins=(h2*60+m2)-(h1*60+m1);
    return `${Math.floor(mins/60)}시간 ${mins%60}분`;
  };

  const clockIn = async () => {
    if (todayRec?.clockIn) return;
    const rec = { id:Date.now(), empId:user.id, date:todayStr(), clockIn:nowTime(), clockOut:null };
    await dbUpsert("attendance", rec);
    setAttendance(prev => [...prev, rec]);
    showToast("✅ 출근 완료!");
  };
  const cancelClockIn = async () => {
    if (!todayRec || todayRec.clockOut) return;
    await dbDelete("attendance", todayRec.id);
    setAttendance(prev => prev.filter(a => a.id !== todayRec.id));
    showToast("↩️ 출근 취소됐어요.");
  };
  const clockOut = async () => {
    if (!todayRec?.clockIn||todayRec?.clockOut) return;
    const t = nowTime();
    await dbUpdate("attendance", todayRec.id, { clock_out: t });
    setAttendance(prev => prev.map(a => a.id===todayRec.id ? {...a, clockOut:t} : a));
    showToast("👋 퇴근 완료!");
  };
  const cancelClockOut = async () => {
    if (!todayRec?.clockOut) return;
    await dbUpdate("attendance", todayRec.id, { clock_out: null });
    setAttendance(prev => prev.map(a => a.id===todayRec.id ? {...a, clockOut:null} : a));
    showToast("↩️ 퇴근 취소됐어요.");
  };
  const applyLeave = async () => {
    let days;
    if (leaveForm.leaveType === "반차") {
      days = 0.5;
    } else {
      days = calcWorkingDays(leaveForm.startDate, leaveForm.endDate);
      if (leaveForm.startHalf) days -= 0.5;
      if (leaveForm.endHalf) days -= 0.5;
    }
    if (days <= 0) { showToast("❌ 선택한 기간에 영업일이 없어요!"); return; }
    if (!user.unlimited && days > remainLeave) { showToast("❌ 남은 휴가가 부족해요!"); return; }
    const rec = { id:Date.now(), empId:user.id, empName:user.name, ...leaveForm, status:"pending", appliedAt:todayStr() };
    await dbUpsert("leaves", rec);
    setLeaves(prev => [...prev, rec]);
    setLeaveForm({ startDate:todayStr(), endDate:todayStr(), reason:"", leaveType:"연차", halfType:"오전", startHalf:false, startHalfType:"오전", endHalf:false, endHalfType:"오후" });
    showToast("📋 휴가 신청 완료! 승인 대기 중이에요."); setTab("leave");
  };
  const cancelLeave = async (id) => {
    await dbDelete("leaves", id);
    setLeaves(prev => prev.filter(l => l.id!==id));
    showToast("🗑 신청이 취소됐어요.");
  };

  const statusBadge = (s) => {
    const map = { pending:["대기중",C.yellow,C.yellowLight], approved:["승인됨",C.green,C.greenLight], rejected:["반려됨",C.red,C.redLight] };
    const [label,color,bg] = map[s]||["?",C.sub,C.bg];
    return <span style={{fontSize:12,fontWeight:700,color,background:bg,padding:"3px 10px",borderRadius:20}}>{label}</span>;
  };

  const TABS = [{k:"home",label:"홈"},{k:"apply",label:"휴가신청"},{k:"leave",label:"내 휴가"},{k:"calendar",label:"팀 캘린더"},{k:"team",label:"팀 출근"},{k:"notice",label:"공지사항"},{k:"todo",label:"할일"}];
  const [menuOpen, setMenuOpen] = useState(false);
  const currentTab = TABS.find(t=>t.k===tab)||TABS[0];

  return (
    <div style={{minHeight:"100vh",background:C.bg}}>
      <Toast msg={toast} />
      {/* 사이드 드로어 */}
      {menuOpen && (
        <div style={{position:"fixed",inset:0,zIndex:100,display:"flex"}}>
          <div style={{width:260,background:C.card,height:"100%",boxShadow:"4px 0 20px #0003",display:"flex",flexDirection:"column"}}>
            <div style={{background:C.primary,padding:"28px 20px 20px",color:"#fff"}}>
              <div style={{fontSize:12,opacity:0.8,marginBottom:4}}>안녕하세요 👋</div>
              <div style={{fontSize:20,fontWeight:800}}>{user.name}님</div>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"12px 0"}}>
              {TABS.map(t=>(
                <button key={t.k} onClick={()=>{setTab(t.k);setMenuOpen(false);}}
                  style={{width:"100%",padding:"12px 20px",border:"none",background:tab===t.k?C.primaryLight:"none",
                    cursor:"pointer",textAlign:"left",fontSize:14,fontWeight:tab===t.k?700:400,
                    color:tab===t.k?C.primary:C.text,borderLeft:tab===t.k?`4px solid ${C.primary}`:"4px solid transparent"}}>
                  {t.label}
                </button>
              ))}
            </div>
            <div style={{padding:"12px 16px",borderTop:`1px solid ${C.border}`}}>
              <button onClick={onLogout} style={{...btn(C.redLight,C.red),width:"100%",padding:"11px",fontSize:14}}>로그아웃</button>
            </div>
          </div>
          <div style={{flex:1,background:"rgba(0,0,0,0.4)"}} onClick={()=>setMenuOpen(false)} />
        </div>
      )}
      {/* 헤더 */}
      <div style={{background:C.primary,padding:"16px 20px",color:"#fff",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:50}}>

            <div style={{background:C.primaryLight,borderRadius:10,padding:"12px 16px",marginBottom:16,fontSize:14}}>
              차감 일수: <strong style={{color:C.primary}}>
                {leaveForm.leaveType==="반차" ? "0.5일" : (() => {
                  let d = calcWorkingDays(leaveForm.startDate, leaveForm.endDate);
                  if (leaveForm.startHalf) d -= 0.5;
                  if (leaveForm.endHalf) d -= 0.5;
                  return Math.max(d,0) + "일";
                })()}
              </strong>
              <span style={{fontSize:12,color:C.sub,marginLeft:6}}>(주말·공휴일 제외)</span>
            </div>
            <button onClick={applyLeave} style={{...btn(C.primary),width:"100%",padding:"14px"}}>신청하기 →</button>
          </div>
        )}
        {tab==="leave" && (
          <div>
            <div style={{fontSize:16,fontWeight:800,marginBottom:16}}>내 휴가 내역</div>

                      <div style={{fontSize:13,color:C.sub,marginBottom:4}}>

        {tab==="team" && (
          <div>
            <div style={{fontSize:16,fontWeight:800,marginBottom:4}}>팀 출근 현황</div>
            <div style={{fontSize:13,color:C.sub,marginBottom:16}}>{new Date().toLocaleDateString("ko-KR",{month:"long",day:"numeric",weekday:"short"})} 기준</div>

                const rec = attendance.find(a => a.empId===emp.id && a.date===todayStr());
                const onLeave = leaves.filter(l=>l.status==="approved").some(l=>l.empId===emp.id && l.startDate<=todayStr() && l.endDate>=todayStr());
                return (
                  <div key={emp.id} style={{background:C.card,borderRadius:12,padding:"14px 16px",
                    display:"flex",justifyContent:"space-between",alignItems:"center",
                    boxShadow:"0 1px 6px #0001",

                      {onLeave ? (
                        <span style={{fontSize:12,background:C.yellowLight,color:C.yellow,padding:"3px 10px",borderRadius:20,fontWeight:700}}>휴가중 🏖️</span>
                      ) : rec?.clockIn ? (

                      ) : (
                        <span style={{fontSize:12,color:C.sub}}>미출근</span>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function AdminScreen({ employees, attendance, setAttendance, leaves, setLeaves, companyEvents, setCompanyEvents, notices, setNotices, todos, setTodos, onLogout }) {
  const [tab, setTab] = useState("leave");
  const [toast, setToast] = useState("");
  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(""),2500); };
  const pendingLeaves = leaves.filter(l => l.status==="pending").sort((a,b)=>b.id-a.id);
  const approvedLeaves = leaves.filter(l => l.status==="approved");
  const tStr = todayStr();
  const onLeaveToday = approvedLeaves.filter(l => l.startDate<=tStr && l.endDate>=tStr);

  // 관리자 본인 출퇴근
  const ADMIN_ID = 77;
  const todayRec = attendance.find(a => a.empId===ADMIN_ID && a.date===tStr);
  const usedLeave = calcUsedLeave(leaves, ADMIN_ID);
  const thisMonth = tStr.slice(0,7);
  const monthRecs = [...attendance.filter(a=>a.empId===ADMIN_ID && a.date.startsWith(thisMonth))].reverse();
  const calcHours = (ci,co) => {
    if (!ci||!co) return "-";
    const [h1,m1]=ci.split(":").map(Number),[h2,m2]=co.split(":").map(Number);
    const mins=(h2*60+m2)-(h1*60+m1);
    return Math.floor(mins/60)+"시간 "+mins%60+"분";
  };
  const clockIn = async () => {
    if (todayRec?.clockIn) return;
    const rec = { id:Date.now(), empId:ADMIN_ID, date:tStr, clockIn:nowTime(), clockOut:null };
    await dbUpsert("attendance", rec);
    setAttendance(prev => [...prev, rec]);
    showToast("✅ 출근 완료!");
  };
  const cancelClockIn = async () => {
    if (!todayRec || todayRec.clockOut) return;
    await dbDelete("attendance", todayRec.id);
    setAttendance(prev => prev.filter(a => a.id!==todayRec.id));
    showToast("↩️ 출근 취소됐어요.");
  };
  const clockOut = async () => {
    if (!todayRec?.clockIn||todayRec?.clockOut) return;
    const t = nowTime();
    await dbUpdate("attendance", todayRec.id, { clock_out: t });
    setAttendance(prev => prev.map(a => a.id===todayRec.id ? {...a,clockOut:t} : a));
    showToast("👋 퇴근 완료!");
  };
  const cancelClockOut = async () => {
    if (!todayRec?.clockOut) return;
    await dbUpdate("attendance", todayRec.id, { clock_out: null });
    setAttendance(prev => prev.map(a => a.id===todayRec.id ? {...a,clockOut:null} : a));
    showToast("↩️ 퇴근 취소됐어요.");
  };

  const decide = async (id, status) => {
    await dbUpdate("leaves", id, { status });
    setLeaves(prev => prev.map(l => l.id===id ? {...l, status} : l));
    showToast(status==="approved"?"✅ 승인했어요!":"❌ 반려했어요.");
  };
  const TABS = [{k:"home",label:"내 홈"},{k:"leave",label:"휴가 승인"},{k:"status",label:"직원 현황"},{k:"attend",label:"출퇴근"},{k:"calendar",label:"팀 캘린더"},{k:"events",label:"회사 일정"},{k:"myleave",label:"내 휴가"},{k:"notice",label:"공지사항"},{k:"todo",label:"할일"}];
  const [menuOpen, setMenuOpen] = useState(false);
  const currentTab = TABS.find(t=>t.k===tab)||TABS[0];

  return (
    <div style={{minHeight:"100vh",background:C.bg}}>
      <Toast msg={toast} />
      {/* 사이드 드로어 */}
      {menuOpen && (
        <div style={{position:"fixed",inset:0,zIndex:100,display:"flex"}}>
          <div style={{width:260,background:C.card,height:"100%",boxShadow:"4px 0 20px #0003",display:"flex",flexDirection:"column"}}>
            <div style={{background:"#5c4a35",padding:"28px 20px 20px",color:"#fff"}}>
              <div style={{fontSize:12,opacity:0.7,marginBottom:4}}>관리자 모드 👑</div>
              <div style={{fontSize:20,fontWeight:800}}>최윤정 사장님</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginTop:14}}>
                {[["직원",employees.length+"명","👥"],["휴가",onLeaveToday.length+"명","🏖️"],["승인",pendingLeaves.length+"건","⏳"]].map(([l,v,ic])=>(
                  <div key={l} style={{background:"rgba(255,255,255,0.15)",borderRadius:10,padding:"8px 4px",textAlign:"center"}}>
                    <div style={{fontSize:14}}>{ic}</div>
                    <div style={{fontSize:14,fontWeight:800}}>{v}</div>
                    <div style={{fontSize:10,opacity:0.7}}>{l}</div>
                  </div>
                ))}
              </div>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"8px 0"}}>
              {TABS.map(t=>(
                <button key={t.k} onClick={()=>{setTab(t.k);setMenuOpen(false);}}
                  style={{width:"100%",padding:"11px 20px",border:"none",background:tab===t.k?C.primaryLight:"none",
                    cursor:"pointer",textAlign:"left",fontSize:14,fontWeight:tab===t.k?700:400,
                    color:tab===t.k?C.primary:C.text,borderLeft:tab===t.k?`4px solid ${C.primary}`:"4px solid transparent"}}>
                  {t.label}
                </button>
              ))}
            </div>
            <div style={{padding:"12px 16px",borderTop:`1px solid ${C.border}`}}>
              <button onClick={onLogout} style={{...btn(C.redLight,C.red),width:"100%",padding:"11px",fontSize:14}}>로그아웃</button>
            </div>
          </div>
          <div style={{flex:1,background:"rgba(0,0,0,0.4)"}} onClick={()=>setMenuOpen(false)} />
        </div>
      )}
      {/* 헤더 */}
      <div style={{background:"#5c4a35",padding:"16px 20px",color:"#fff",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:50}}>
        <button onClick={()=>setMenuOpen(true)} style={{background:"none",border:"none",color:"#fff",fontSize:22,cursor:"pointer",padding:"4px",lineHeight:1}}>☰</button>
        <div style={{flex:1,fontSize:16,fontWeight:800}}>{currentTab.label}</div>
        {pendingLeaves.length>0 && <div style={{background:C.red,color:"#fff",borderRadius:20,fontSize:11,fontWeight:700,padding:"2px 8px"}}>{pendingLeaves.length}</div>}
        <div style={{fontSize:12,opacity:0.8}}>👑</div>
      </div>
      <div style={{padding:16,maxWidth:600,margin:"0 auto"}}>
        {tab==="home" && (
          <div>
            {/* 출퇴근 카드 */}
            <div style={{background:C.card,borderRadius:16,padding:20,marginBottom:16,boxShadow:"0 1px 8px #0001"}}>
              <div style={{fontSize:13,color:C.sub,marginBottom:4}}>오늘 출퇴근</div>
              <div style={{fontSize:12,color:C.sub,marginBottom:16}}>{new Date().toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric",weekday:"short"})}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
                <div style={{background:C.greenLight,borderRadius:12,padding:"14px 16px"}}>
                  <div style={{fontSize:11,color:C.green,fontWeight:700}}>출근</div>
                  <div style={{fontSize:22,fontWeight:800,color:C.text}}>{todayRec?.clockIn||"--:--"}</div>
                </div>

// ── 생일 유틸 ──────────────────────────────────────────
function getBirthday(password) {
  if (!password || password.length !== 6) return null;
  const mm = parseInt(password.slice(2,4));
  const dd = parseInt(password.slice(4,6));
  return { mm, dd };
}

function BirthdayBanner({ employees }) {
  const now = new Date();
  const kst = new Date(now.getTime() + 9*60*60*1000);
  const mm = kst.getMonth()+1;
  const dd = kst.getDate();
  const todayBdays = employees.filter(e => {
    const b = getBirthday(e.password);
    return b && b.mm===mm && b.dd===dd;
  });
  const monthBdays = employees.filter(e => {
    const b = getBirthday(e.password);
    return b && b.mm===mm && b.dd!==dd;
  }).sort((a,b)=>{
    const ba=getBirthday(a.password), bb=getBirthday(b.password);
    return ba.dd - bb.dd;
  });
  if (todayBdays.length===0 && monthBdays.length===0) return null;
  return (
    <div style={{marginBottom:16}}>
      {todayBdays.length>0 && (
        <div style={{background:"linear-gradient(135deg,#ff6b9d,#ffa07a)",borderRadius:16,padding:"16px 20px",marginBottom:10,boxShadow:"0 2px 12px #ff6b9d44"}}>
          <div style={{fontSize:20,marginBottom:6}}>🎂</div>
          <div style={{fontWeight:800,fontSize:16,color:"#fff",marginBottom:4}}>오늘의 생일!</div>
          <div style={{color:"#fff",fontSize:15}}>{todayBdays.map(e=>e.name).join(", ")}님 생일을 축하해요! 🎉</div>
        </div>
      )}
      {monthBdays.length>0 && (
        <div style={{background:C.card,borderRadius:14,padding:"14px 18px",boxShadow:"0 1px 8px #0001"}}>
          <div style={{fontSize:13,fontWeight:700,color:C.sub,marginBottom:10}}>🎂 이번달 생일</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {monthBdays.map(e=>{
              const b=getBirthday(e.password);
              return (
                <div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontSize:14,fontWeight:600}}>{e.name}</div>
                  <div style={{fontSize:13,color:C.sub}}>{b.mm}월 {b.dd}일 🎂</div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ── 공지사항 ────────────────────────────────────────────
function NoticeBoard({ notices, setNotices, isAdmin, showToast }) {
  const [form, setForm] = useState({ title:"", content:"" });
  const [expanded, setExpanded] = useState(null);
  const sorted = [...(notices||[])].sort((a,b)=>b.id-a.id);

  const addNotice = async () => {
    if (!form.title.trim()) return;
    const rec = { id:Date.now(), title:form.title, content:form.content, author:"최윤정", createdAt:todayStr() };
    await dbUpsert("notices", rec);
    if (setNotices) setNotices(prev=>[...prev,rec]);
    setForm({ title:"", content:"" });
    showToast && showToast("📢 공지가 등록됐어요!");
  };

  const deleteNotice = async (id) => {
    await dbDelete("notices", id);
    if (setNotices) setNotices(prev=>prev.filter(n=>n.id!==id));
    showToast && showToast("🗑 삭제됐어요.");
  };

  return (
    <div>
      {isAdmin && (
        <div style={{background:C.card,borderRadius:16,padding:20,marginBottom:16,boxShadow:"0 1px 8px #0001"}}>
          <div style={{fontSize:15,fontWeight:800,marginBottom:14}}>📢 공지 작성</div>
          <input value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} placeholder="제목"
            style={{display:"block",width:"100%",marginBottom:10,padding:"11px 14px",borderRadius:10,border:"1px solid "+C.border,fontSize:14,boxSizing:"border-box",outline:"none"}} />
          <textarea value={form.content} onChange={e=>setForm(f=>({...f,content:e.target.value}))} placeholder="내용 (선택)"
            style={{display:"block",width:"100%",marginBottom:12,padding:"11px 14px",borderRadius:10,border:"1px solid "+C.border,fontSize:14,boxSizing:"border-box",resize:"none",height:80,fontFamily:"inherit",outline:"none"}} />
          <button onClick={addNotice} style={{...btn(C.primary),width:"100%",padding:"12px"}}>등록하기 →</button>
        </div>
      )}
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {sorted.length===0
          ? <div style={{background:C.card,borderRadius:14,padding:32,textAlign:"center",color:C.sub}}>공지사항이 없어요</div>
          : sorted.map(n=>(
            <div key={n.id} style={{background:C.card,borderRadius:14,padding:"16px 18px",boxShadow:"0 1px 8px #0001",cursor:"pointer"}}
              onClick={()=>setExpanded(expanded===n.id?null:n.id)}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:15,marginBottom:4}}>{n.title}</div>
                  <div style={{fontSize:12,color:C.sub}}>{n.author} · {fmt(n.createdAt)}</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  {isAdmin && <button onClick={e=>{e.stopPropagation();deleteNotice(n.id);}}
                    style={{...btn(C.redLight,C.red),fontSize:11,padding:"4px 10px"}}>삭제</button>}
                  <span style={{color:C.sub,fontSize:14}}>{expanded===n.id?"▲":"▼"}</span>
                </div>
              </div>
              {expanded===n.id && n.content && (
                <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid "+C.border,fontSize:14,color:C.text,lineHeight:1.7,whiteSpace:"pre-wrap"}}>
                  {n.content}
                </div>
              )}
            </div>
          ))
        }
      </div>
    </div>
  );
}

// ── 할일 목록 ───────────────────────────────────────────
function TodoBoard({ user, todos, setTodos, showToast, isAdmin, employees }) {
  const [content, setContent] = useState("");
  const [shareTarget, setShareTarget] = useState("none"); // none | all | urvs | everi | marketing
  const [filter, setFilter] = useState("my");

  const TEAMS = ["all","urvs","everi","marketing"];
  const TEAM_LABELS = {none:"나만보기", all:"전체공유", urvs:"urvs팀", everi:"everi팀", marketing:"마케팅팀"};
  const TEAM_COLORS = {all:C.primary, urvs:"#5c4a35", everi:"#8b7355", marketing:"#c4956a"};

  const userTeam = user.team || null;

  const visibleTodos = (todos||[]).filter(t => {
    if (t.empId === user.id) return true; // 내꺼
    if (!t.shared) return false;
    if (t.sharedTeam === "all") return true; // 전체공유
    if (t.sharedTeam === userTeam) return true; // 같은팀
    if (isAdmin) return true; // 관리자는 다 봄
    return false;
  });

  const myTodos = visibleTodos.filter(t => t.empId===user.id && !t.shared);
  const sharedTodos = visibleTodos.filter(t => t.shared);

  const addTodo = async () => {
    if (!content.trim()) return;
    const isShared = shareTarget !== "none";
    const rec = { id:Date.now(), empId:user.id, empName:user.name, content, done:false, shared:isShared, sharedTeam:isShared?shareTarget:null, createdAt:todayStr() };
    await dbUpsert("todos", rec);
    setTodos(prev=>[...prev,rec]);
    setContent("");
    showToast("✅ 할일이 추가됐어요!");
  };

  const toggleDone = async (todo) => {
    await dbUpdate("todos", todo.id, { done: !todo.done });
    setTodos(prev=>prev.map(t=>t.id===todo.id?{...t,done:!t.done}:t));
  };

  const deleteTodo = async (id) => {
    await dbDelete("todos", id);
    setTodos(prev=>prev.filter(t=>t.id!==id));
    showToast("🗑 삭제됐어요.");
  };

  const filterOptions = isAdmin
    ? [["my","내 할일"],["shared","공유됨"],["all","전체"]]
    : [["my","내 할일"],["shared","공유됨"]];

  const displayTodos = filter==="my" ? myTodos : filter==="shared" ? sharedTodos : visibleTodos;

  return (
    <div>
      <div style={{background:C.card,borderRadius:16,padding:20,marginBottom:16,boxShadow:"0 1px 8px #0001"}}>
        <div style={{fontSize:15,fontWeight:800,marginBottom:14}}>할일 추가</div>
        <input value={content} onChange={e=>setContent(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&addTodo()}
          placeholder="할일을 입력하세요"
          style={{display:"block",width:"100%",marginBottom:12,padding:"11px 14px",borderRadius:10,border:"1px solid "+C.border,fontSize:14,boxSizing:"border-box",outline:"none"}} />
        <div style={{fontSize:12,color:C.sub,fontWeight:700,marginBottom:8}}>공유 범위</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
          {(["none","all",...TEAMS.filter(t=>t!=="all")]).map(k=>(
            <button key={k} onClick={()=>setShareTarget(k)}
              style={{padding:"6px 14px",borderRadius:20,border:"none",cursor:"pointer",fontSize:12,fontWeight:shareTarget===k?700:400,
                background:shareTarget===k?(k==="none"?C.bg:TEAM_COLORS[k]||C.primary):"#f0ebe3",
                color:shareTarget===k?(k==="none"?C.text:"#fff"):C.sub}}>
              {TEAM_LABELS[k]}
            </button>
          ))}
        </div>
        <button onClick={addTodo} style={{...btn(C.primary),width:"100%",padding:"12px"}}>추가하기 +</button>
      </div>

      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        {filterOptions.map(([k,l])=>(
          <button key={k} onClick={()=>setFilter(k)}
            style={{padding:"7px 16px",borderRadius:20,border:"none",cursor:"pointer",fontSize:13,fontWeight:filter===k?700:400,
              background:filter===k?C.primary:C.card,color:filter===k?"#fff":C.sub}}>
            {l}
          </button>
        ))}
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {displayTodos.length===0
          ? <div style={{background:C.card,borderRadius:14,padding:32,textAlign:"center",color:C.sub}}>할일이 없어요 🎉</div>
          : [...displayTodos].sort((a,b)=>a.done-b.done).map(t=>(
            <div key={t.id} style={{background:C.card,borderRadius:12,padding:"14px 16px",boxShadow:"0 1px 6px #0001",
              display:"flex",alignItems:"center",gap:12,opacity:t.done?0.6:1}}>
              <div onClick={()=>toggleDone(t)} style={{width:22,height:22,borderRadius:"50%",border:"2px solid "+(t.done?C.green:C.border),
                background:t.done?C.green:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                {t.done && <span style={{color:"#fff",fontSize:12}}>✓</span>}
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:600,textDecoration:t.done?"line-through":"none",color:t.done?C.sub:C.text}}>{t.content}</div>
                <div style={{fontSize:11,color:C.sub,marginTop:2,display:"flex",alignItems:"center",gap:6}}>
                  <span>{t.empName}</span>
                  {t.shared && t.sharedTeam && (
                    <span style={{background:TEAM_COLORS[t.sharedTeam]||C.primary,color:"#fff",borderRadius:20,padding:"1px 8px",fontSize:10,fontWeight:700}}>
                      {TEAM_LABELS[t.sharedTeam]||t.sharedTeam}
                    </span>
                  )}
                </div>
              </div>
              {(t.empId===user.id||isAdmin) && (
                <button onClick={()=>deleteTodo(t.id)} style={{background:"none",border:"none",color:C.sub,cursor:"pointer",fontSize:16}}>✕</button>
              )}
            </div>
          ))
        }
      </div>
    </div>
  );
}

function AdminLeaveManager({ leaves, setLeaves, showToast }) {
  const ADMIN_ID = 77;
  const ADMIN_NAME = "최윤정";
  const [form, setForm] = useState({ startDate:todayStr(), endDate:todayStr(), reason:"", leaveType:"연차", halfType:"오전" });
  const myLeaves = (leaves||[]).filter(l => l.empId===ADMIN_ID).sort((a,b)=>b.id-a.id);

  const addLeave = async () => {
    if (!form.startDate) return;
    const rec = { id:Date.now(), empId:ADMIN_ID, empName:ADMIN_NAME, ...form, status:"approved", appliedAt:todayStr() };
    await dbUpsert("leaves", rec);
    setLeaves(prev => [...prev, rec]);
    setForm({ startDate:todayStr(), endDate:todayStr(), reason:"", leaveType:"연차", halfType:"오전" });
    showToast("✅ 휴가가 등록됐어요!");
  };

  const deleteLeave = async (id) => {
    await dbDelete("leaves", id);
    setLeaves(prev => prev.filter(l => l.id!==id));
    showToast("🗑 삭제됐어요.");
  };

  return (
    <div>
      <div style={{background:C.card,borderRadius:16,padding:20,marginBottom:16,boxShadow:"0 1px 8px #0001"}}>
        <div style={{fontSize:15,fontWeight:800,marginBottom:16}}>🏖️ 내 휴가 등록</div>
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          {["연차","반차"].map(t=>(
            <button key={t} onClick={()=>setForm(f=>({...f,leaveType:t}))}
              style={{flex:1,padding:"11px",border:"none",borderRadius:10,cursor:"pointer",fontWeight:700,fontSize:14,
                background:form.leaveType===t?C.primary:C.bg,color:form.leaveType===t?"#fff":C.sub}}>
              {t==="연차"?"📅 연차":"🌗 반차"}
            </button>
          ))}
        </div>
        {form.leaveType==="반차" && (
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            {["오전","오후"].map(t=>(
              <button key={t} onClick={()=>setForm(f=>({...f,halfType:t}))}
                style={{flex:1,padding:"10px",border:"2px solid "+(form.halfType===t?C.primary:C.border),borderRadius:10,cursor:"pointer",fontWeight:700,fontSize:13,
                  background:form.halfType===t?C.primaryLight:C.card,color:form.halfType===t?C.primary:C.sub}}>
                {t==="오전"?"🌅 오전":"🌇 오후"}
              </button>
            ))}
          </div>
        )}
        <div style={{display:"grid",gridTemplateColumns:form.leaveType==="연차"?"1fr 1fr":"1fr",gap:10,marginBottom:14}}>
          <div>
            <label style={{fontSize:13,color:C.sub,fontWeight:700}}>{form.leaveType==="반차"?"날짜":"시작일"}</label>
            <input type="date" value={form.startDate}
              onChange={e=>setForm(f=>({...f,startDate:e.target.value,endDate:f.leaveType==="반차"?e.target.value:f.endDate}))}
              style={{display:"block",width:"100%",marginTop:6,padding:"10px 12px",borderRadius:10,border:"1px solid "+C.border,fontSize:14,boxSizing:"border-box"}} />
          </div>
          {form.leaveType==="연차" && (
            <div>
              <label style={{fontSize:13,color:C.sub,fontWeight:700}}>종료일</label>
              <input type="date" value={form.endDate} onChange={e=>setForm(f=>({...f,endDate:e.target.value}))}
                style={{display:"block",width:"100%",marginTop:6,padding:"10px 12px",borderRadius:10,border:"1px solid "+C.border,fontSize:14,boxSizing:"border-box"}} />
            </div>
          )}
        </div>
        <input value={form.reason} onChange={e=>setForm(f=>({...f,reason:e.target.value}))} placeholder="사유 (선택)"
          style={{display:"block",width:"100%",marginBottom:14,padding:"10px 12px",borderRadius:10,border:"1px solid "+C.border,fontSize:14,boxSizing:"border-box"}} />
        <button onClick={addLeave} style={{...btn(C.primary),width:"100%",padding:"13px"}}>등록하기 →</button>
      </div>
      <div style={{fontSize:14,fontWeight:700,marginBottom:10}}>내 휴가 내역</div>
      {myLeaves.length===0
        ? <div style={{background:C.card,borderRadius:14,padding:32,textAlign:"center",color:C.sub}}>등록된 휴가가 없어요</div>
        : <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {myLeaves.map(l=>(
              <div key={l.id} style={{background:C.card,borderRadius:12,padding:"14px 16px",boxShadow:"0 1px 6px #0001",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontWeight:700,fontSize:14}}>
                    {l.leaveType==="반차"?(l.halfType||"오전")+"반차":l.startDate===l.endDate?fmt(l.startDate):fmt(l.startDate)+" ~ "+fmt(l.endDate)}
                  </div>
                  <div style={{fontSize:12,color:C.sub,marginTop:2}}>{l.leaveType==="반차"?"0.5일":(l.startDate&&l.endDate?calcWorkingDays(l.startDate,l.endDate):1)+"일"}</div>
                </div>
                <button onClick={()=>deleteLeave(l.id)} style={{...btn(C.redLight,C.red),fontSize:12,padding:"6px 12px"}}>삭제</button>
              </div>
            ))}
          </div>
      }
    </div>
  );
}

function App() {
  const [user, setUser] = useState(()=>{
    const saved = loadState("currentUser", null);
    if (!saved) return null;
    if (saved.role === "admin") return saved;
    // 저장된 user를 최신 INITIAL_EMPLOYEES로 업데이트
    const fresh = INITIAL_EMPLOYEES.find(e=>e.id===saved.id);
    return fresh ? {...fresh, role: saved.role||"직원"} : saved;
  });
  const [employees, setEmployees] = useState(INITIAL_EMPLOYEES); // 항상 최신 데이터 사용
  const [attendance, setAttendance] = useState([]);
  const [leaves, setLeaves] = useState([]);
  const [companyEvents, setCompanyEvents] = useState([]);
  const [notices, setNotices] = useState([]);
  const [todos, setTodos] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(()=>{
    async function fetchAll() {
      const [att,lev,evt,ntc,tds] = await Promise.all([dbLoad("attendance"),dbLoad("leaves"),dbLoad("company_events"),dbLoad("notices"),dbLoad("todos")]);
      setAttendance(att); setLeaves(lev); setCompanyEvents(evt); setNotices(ntc); setTodos(tds); setLoading(false);
    }
    fetchAll();
    const timer = setInterval(async()=>{
      const [att,lev,evt,ntc,tds] = await Promise.all([dbLoad("attendance"),dbLoad("leaves"),dbLoad("company_events"),dbLoad("notices"),dbLoad("todos")]);
      setAttendance(att); setLeaves(lev); setCompanyEvents(evt); setNotices(ntc); setTodos(tds);
    },10000);
    return ()=>clearInterval(timer);
  },[]);

  const login = (u)=>{
    // 항상 최신 INITIAL_EMPLOYEES 데이터로 덮어씌우기
    const fresh = INITIAL_EMPLOYEES.find(e=>e.id===u.id);
    const finalUser = fresh ? {...fresh, role: u.role||"직원"} : u;
    setUser(finalUser);
    saveState("currentUser", finalUser);
  };
  const logout = ()=>{setUser(null);saveState("currentUser",null);};

  if (loading) return (
    <div style={{minHeight:"100vh",background:"#f5f0e8",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12}}>
      <div style={{fontSize:36}}>🏢</div>
      <div style={{fontSize:16,fontWeight:700,color:"#8b7355"}}>DYNA team</div>
      <div style={{fontSize:13,color:"#9e8e7e"}}>데이터 불러오는 중...</div>
    </div>
  );

  if (!user) return <LoginScreen employees={employees} onLogin={login} />;
  if (user.role==="admin") return <AdminScreen employees={employees} setEmployees={setEmployees} attendance={attendance} setAttendance={setAttendance} leaves={leaves} setLeaves={setLeaves} companyEvents={companyEvents} setCompanyEvents={setCompanyEvents} notices={notices} setNotices={setNotices} todos={todos} setTodos={setTodos} onLogout={logout} />;
  return <EmployeeScreen user={user} employees={employees} attendance={attendance} setAttendance={setAttendance} leaves={leaves} setLeaves={setLeaves} companyEvents={companyEvents} notices={notices} todos={todos} setTodos={setTodos} onLogout={logout} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
